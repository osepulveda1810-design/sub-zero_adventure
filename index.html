<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#16213e">
    <link rel="manifest" href="manifest.json">
    <title>Sub-Zero Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; }

        body {
            background-color: #16213e; display: flex; justify-content: center; align-items: center;
            height: 100dvh; width: 100vw; overflow: hidden; font-family: sans-serif; touch-action: none; position: fixed;
        }

        #game-container {
            display: flex;
            width: 100vw; height: 100dvh;
            max-width: none; padding: 0; background-color: #16213e;
            position: fixed;
            top: 0; left: 0;
            transform-origin: left top;
        }

        /* Bloqueo real por CSS: si el teléfono está físicamente en vertical,
           el contenedor se rota 90° matemáticamente para llenar toda la
           pantalla en horizontal. No depende de JS ni de si el auto-rotate
           del sistema está activo o no: se aplica siempre que el viewport
           sea más alto que ancho. */
        @media screen and (orientation: portrait) {
            #game-container {
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 0; left: 100%;
                transform-origin: left top;
                transform: rotate(90deg);
            }
        }

        #canvas-wrapper {
            position: relative; 
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
            background-color: #16213e; 
            overflow: hidden;
        }

        canvas { 
            display: block; 
            width: 100%; height: 100%;
            image-rendering: pixelated; 
            background-color: #16213e; 
        }

        /* --- CONTROLES TÁCTILES --- */
        #controls {
            position: absolute;
            bottom: max(15px, env(safe-area-inset-bottom, 15px));
            left: 0; width: 100%; padding: 0 15px;
            display: flex; justify-content: space-between;
            align-items: flex-end; z-index: 10;
            pointer-events: none; 
        }

        #controls .control-group, #controls .btn {
            pointer-events: auto; 
        }

        .control-group.dpad {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .dpad-row { display: flex; gap: 10px; }
        .btn-small {
            width: 46px; height: 46px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.3);
            background: rgba(20, 30, 50, 0.6); color: #fff; font-size: 18px;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            transition: all 0.1s; touch-action: none; cursor: pointer;
        }
        .btn-small:active, .btn-small.active { background: rgba(78, 204, 163, 0.6); border-color: rgba(78, 204, 163, 1); transform: scale(0.9); }

        .btn {
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.3);
            background: rgba(20, 30, 50, 0.6); 
            backdrop-filter: blur(2px);
            color: #fff; font-size: 24px;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            transition: all 0.1s; touch-action: none; cursor: pointer;
        }
        .btn:active, .btn.active { background: rgba(78, 204, 163, 0.6); border-color: rgba(78, 204, 163, 1); transform: scale(0.9); }

        .attack-group { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; justify-content: flex-end; max-width: 240px; }

        #btn-punch, #btn-kick {
            width: 66px; height: 66px; border-radius: 50%; padding: 0;
            background: radial-gradient(circle, rgba(160, 230, 255, 0.05) 0%, rgba(160, 230, 255, 0.15) 100%);
            border: 2px solid rgba(160, 230, 255, 0.4);
            box-shadow:
                0 0 20px rgba(160, 230, 255, 0.2),
                inset 0 0 25px rgba(160, 230, 255, 0.2),
                inset 0 0 5px rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none; -webkit-user-select: none;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #btn-punch:active, #btn-punch.active, #btn-kick:active, #btn-kick.active {
            transform: scale(0.88);
            background: radial-gradient(circle, rgba(160, 230, 255, 0.15) 0%, rgba(160, 230, 255, 0.3) 100%);
            box-shadow:
                0 0 30px rgba(160, 230, 255, 0.5),
                inset 0 0 30px rgba(160, 230, 255, 0.5);
            border-color: rgba(160, 230, 255, 0.8);
        }
        .punch-icon, .boot-icon {
            width: 60%; height: 60%;
            pointer-events: none;
            filter: drop-shadow(0 0 6px rgba(160, 230, 255, 0.8)) drop-shadow(0 0 2px #fff);
            transition: transform 0.1s ease;
        }
        #btn-punch:active .punch-icon, #btn-punch.active .punch-icon {
            transform: scale(0.95) translateY(-5px);
            filter: drop-shadow(0 0 10px rgba(160, 230, 255, 1)) drop-shadow(0 0 4px #fff);
        }
        #btn-kick:active .boot-icon, #btn-kick.active .boot-icon {
            transform: scale(0.95) rotate(-3deg);
            filter: drop-shadow(0 0 10px rgba(160, 230, 255, 1)) drop-shadow(0 0 4px #fff);
        }

        #btn-jump { width: 80px; height: 80px; background: rgba(200, 30, 30, 0.4); border-color: rgba(255, 50, 50, 0.6); font-weight: bold; font-size: 16px; }
        #btn-jump:active, #btn-jump.active { background: rgba(255, 50, 50, 0.8); }

        @media (max-width: 500px) {
            .btn { width: 60px; height: 60px; font-size: 20px; }
            #btn-punch, #btn-kick { width: 58px; height: 58px; }
            #btn-jump { width: 70px; height: 70px; }
            .attack-group { max-width: 200px; gap: 6px; }
        }
        @media (max-width: 400px) {
            .btn { width: 55px; height: 55px; font-size: 18px; }
            #btn-punch, #btn-kick { width: 52px; height: 52px; }
            #btn-jump { width: 65px; height: 65px; }
            .attack-group { max-width: 180px; gap: 5px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>

            <div id="controls">
                <div class="control-group dpad">
                    <button class="btn-small" id="btn-forward">▲</button>
                    <div class="dpad-row">
                        <button class="btn" id="btn-left">◀</button>
                        <button class="btn" id="btn-right">▶</button>
                    </div>
                    <button class="btn-small" id="btn-backward">▼</button>
                </div>
                <div class="control-group attack-group">
                    <button class="btn" id="btn-punch" aria-label="Ataque de Puño">
                        <svg class="punch-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <g fill="none" stroke="#a0e6ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M 32 75 L 68 75 L 65 92 L 35 92 Z" />
                                <path d="M 33 83 L 67 83" stroke-width="2" />
                                <path d="M 32 75 C 10 65 8 35 28 18 C 45 3 70 8 78 28 C 82 38 82 48 78 55" />
                                <path d="M 60 40 C 85 45 92 65 75 75 L 68 75 C 60 75 55 65 60 55" />
                                <path d="M 45 22 C 38 40 48 62 65 68" stroke-width="2.5" />
                            </g>
                        </svg>
                    </button>
                    <button class="btn" id="btn-kick" aria-label="Patada Alta">
                        <svg class="boot-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <g fill="none" stroke="#a0e6ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M 65 20 L 65 55 C 65 65 72 75 70 85 C 69 88 64 90 55 90 L 25 90 C 12 90 12 78 22 72 C 32 66 38 58 38 45 L 38 20 Z" />
                                <path d="M 21 83 L 69 83" />
                                <path d="M 22 72 C 28 72 32 77 32 83" />
                                <path d="M 65 65 C 60 70 60 80 69 83" stroke-width="2"/>
                                <path d="M 38 25 L 48 30 L 38 35 L 48 40 L 38 45 L 48 50 L 38 55 L 45 60" stroke-width="2.5"/>
                                <path d="M 35 20 L 68 20" stroke-width="5" />
                            </g>
                        </svg>
                    </button>
                    <button class="btn" id="btn-jump">SALTO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        ctx.imageSmoothingEnabled = false;

        // --- Sprites ---
        const idleSprite = new Image(); idleSprite.src = 'idle_subzero.png';
        const walkSprite = new Image(); walkSprite.src = 'walk_subzero.png';
        const jumpSprite = new Image(); jumpSprite.src = 'jump_subzero.png';
        const kickSprite = new Image(); kickSprite.src = 'kick_subzero.png';
        const kick2Sprite = new Image(); kick2Sprite.src = 'kick_subzero2.png';
        const punchSprite = new Image(); punchSprite.src = 'punch_subzero.png';
        const punch2Sprite = new Image(); punch2Sprite.src = 'punch_subzero2.png';
        const punchAirSprite = new Image(); punchAirSprite.src = 'punch_air.png';
        const kickAirSprite = new Image(); kickAirSprite.src = 'kick_air.png';

        let currentSprite = idleSprite; 
        let currentFrame = 0;
        const totalFrames = 4;
        let frameSpeed = 150;
        let lastTime = 0;
        let lastJumpFrameTime = 0;

        let playerX = 50; let playerY = 50;
        let velocityX = 0; let velocityY = 0;
        const speed = 2.2; const gravity = 0.22; const jumpStrength = -7.5;
        let facingRight = true; let scale = 1;

        let baseDrawWidth = 0;
        let baseDrawHeight = 0;

        // --- CARRIL DE PELEA ---
        let laneTop = 0; let laneBottom = 0; let playerLaneY = 0;
        const depthSpeed = 1.6;
        let positionInitialized = false;

        // Offsets de ajuste generales
        const idleFrameOffset = [0, 0, 0, 0];
        const walkFrameOffset = [0, 0, 0, 0];
        const jumpFrameOffset = [0, 0, 0, 0];
        const kickFrameOffset = [0, 0, 0, 0];
        const kick2FrameOffset = [0, 0, 0, 0];
        const kickCustomScale = 1.0;
        const kickVerticalOffset = 0;
        const punchFrameOffset = [0, 3, 16, 22];
        const punch2FrameOffset = [0, 0, 0, -20]; // Frame 4 del hielo necesita ajuste
        const punchAirFrameOffset = [0, 0, 0, 0];
        const kickAirFrameOffset = [0, 0, 0, 0];
        // Estos sprites vienen en un lienzo de 4 frames (como el resto), pero el
        // personaje solo está dibujado en un frame específico dentro de ese lienzo.
        const punchAirSourceFrame = 0;
        const kickAirSourceFrame = 1;

        let jumpTimer = 0;
        let isJumping = false;
        let isLanding = false;
        let landingTimer = 0;
        const jumpFrameTimes = [150, 120, 260, 180]; 

        // --- ATAQUES ---
        const punchFrameTimes = [100, 100, 120, 160];
        const punch2FrameTimes = [120, 140, 100, 350]; // Hielo es más lento al cargar
        const kickFrameTimes = [160, 180, 140, 240];
        const kick2FrameTimes = [180, 200, 160, 300]; // Patada fuerte más lenta y pesada
        const punchAirFrameTimes = [260];
        const kickAirFrameTimes = [260];
        let isAttacking = false;
        let attackKind = null;
        let attackTimer = 0;
        let lastAttackFrameTime = 0;
        let attackRequested = null;
        let damageDealt = false;

        // --- SISTEMA DOBLE-TAP ---
        let punchTapCount = 0;
        let punchLastTapTime = 0;
        const punchDoubleTapWindow = 350; // ms entre taps para combo
        let kickTapCount = 0;
        let kickLastTapTime = 0;
        const kickDoubleTapWindow = 350; // ms entre taps para combo // Para evitar daño múltiple en un solo ataque

        const keys = { right: false, left: false, up: false, forward: false, backward: false };

        // --- 🛠️ AJUSTES DE ESCALA Y POSICIÓN ---
        const punchCustomScale = 1.0; 
        const punch2CustomScale = 1.0;
        const punchVerticalOffset = 0; 
        const punch2VerticalOffset = 0;
        const punchAirCustomScale = 1.0;
        const kickAirCustomScale = 1.0;
        const punchAirVerticalOffset = 0;
        const kickAirVerticalOffset = 0;

        // Recortes para punch normal
        const punchCropAdjustX = [0, 0, 0, 0]; 
        const punchCropAdjustW = [0, -5, -5, -5]; 

        // Recortes para punch hielo (frame 4 tiene el personaje más a la izquierda)
        const punch2CropAdjustX = [0, 0, 6, 0]; 
        const punch2CropAdjustW = [0, 0, -28, -35]; 

        // Recortes para ataques aéreos (sin ajuste por defecto)
        const punchAirCropAdjustX = [0, 0, 0, 0];
        const punchAirCropAdjustW = [14, 0, 0, 0];
        const kickAirCropAdjustX = [-4, 0, 0, 0];
        const kickAirCropAdjustW = [28, 0, 0, 0];

        // --- SISTEMA DE DAÑO ---
        const enemy = {
            x: 0, y: 0, width: 60, height: 100,
            health: 100, maxHealth: 100,
            laneY: 0,
            flashTimer: 0,
            dead: false
        };

        const damageValues = {
            punch: 10,
            kick: 15,
            kick2: 30,
            punch2: 25,
            punch_air: 10,
            kick_air: 15
        };

        const floatingTexts = []; // { x, y, text, color, timer, life }

        function spawnFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, timer: 0, life: 800 });
        }

        function resetEnemy() {
            enemy.health = enemy.maxHealth;
            enemy.dead = false;
            enemy.flashTimer = 0;
        }

        function requestAttack(kind) {
            if (enemy.dead) return;

            // Ataques aéreos: si el jugador está en el aire (saltando), el mismo botón
            // de golpe/patada activa la variante aérea en vez del combo de doble-tap.
            if (isJumping && !isAttacking) {
                if (kind === 'punch') {
                    attackRequested = 'punch_air';
                    punchTapCount = 0;
                    return;
                } else if (kind === 'kick') {
                    attackRequested = 'kick_air';
                    kickTapCount = 0;
                    return;
                }
            }

            const now = performance.now();

            // Sistema de doble-tap para PUÑO (1 tap = punch, 2 taps = punch2/hielo)
            if (kind === 'punch') {
                if (now - punchLastTapTime < punchDoubleTapWindow) {
                    punchTapCount++;
                } else {
                    punchTapCount = 1;
                }
                punchLastTapTime = now;

                if (punchTapCount >= 2) {
                    attackRequested = 'punch2';
                    punchTapCount = 0;
                } else if (!isAttacking) {
                    attackRequested = 'punch';
                }
            }
            // Sistema de doble-tap para PATADA (1 tap = kick, 2 taps = kick2)
            else if (kind === 'kick') {
                if (now - kickLastTapTime < kickDoubleTapWindow) {
                    kickTapCount++;
                } else {
                    kickTapCount = 1;
                }
                kickLastTapTime = now;

                if (kickTapCount >= 2) {
                    attackRequested = 'kick2';
                    kickTapCount = 0;
                } else if (!isAttacking) {
                    attackRequested = 'kick';
                }
            } else if (!isAttacking) {
                attackRequested = kind;
            }
        }

        // --- CONTROLES ---
        document.addEventListener('keydown', (e) => {
            if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if(e.code === 'ArrowUp' || e.code === 'KeyW') { keys.forward = true; e.preventDefault(); }
            if(e.code === 'ArrowDown' || e.code === 'KeyS') { keys.backward = true; e.preventDefault(); }
            if(e.code === 'Space') { keys.up = true; e.preventDefault(); }
            if(e.code === 'KeyJ' && !e.repeat) requestAttack('punch');
            if(e.code === 'KeyK' && !e.repeat) requestAttack('kick');
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if(e.code === 'ArrowUp' || e.code === 'KeyW') keys.forward = false;
            if(e.code === 'ArrowDown' || e.code === 'KeyS') keys.backward = false;
            if(e.code === 'Space') keys.up = false;
        });

        function setupTouchButton(elementId, keyName) {
            const el = document.getElementById(elementId);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; el.classList.add('active'); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; el.classList.remove('active'); });
            el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[keyName] = false; el.classList.remove('active'); });
        }
        setupTouchButton('btn-left', 'left');
        setupTouchButton('btn-right', 'right');
        setupTouchButton('btn-jump', 'up');
        setupTouchButton('btn-forward', 'forward');
        setupTouchButton('btn-backward', 'backward');

        function setupAttackButton(elementId, kind) {
            const el = document.getElementById(elementId);
            const trigger = (e) => { e.preventDefault(); requestAttack(kind); el.classList.add('active'); setTimeout(() => el.classList.remove('active'), 120); };
            el.addEventListener('touchstart', trigger);
            el.addEventListener('click', trigger);
        }
        setupAttackButton('btn-punch', 'punch');
        setupAttackButton('btn-kick', 'kick');

        // --- CONFIGURACIÓN DEL CANVAS ---
        function setupCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const w = wrapper.clientWidth;
            const h = wrapper.clientHeight;

            canvas.width = w;
            canvas.height = h;

            const frameHeight = idleSprite.height || 369;
            scale = (h * 0.65) / frameHeight;

            baseDrawWidth = ((idleSprite.width || 677) / totalFrames) * scale;
            baseDrawHeight = (idleSprite.height || 369) * scale;

            laneBottom = canvas.height - (frameHeight * scale) - 20;
            const laneHeight = Math.min(canvas.height * 0.35, 160);
            laneTop = Math.max(20, laneBottom - laneHeight);

            if (playerLaneY > laneBottom || playerLaneY === 0) playerLaneY = laneBottom;
            if (playerLaneY < laneTop) playerLaneY = laneTop;

            if (!positionInitialized) {
                playerY = playerLaneY;
                positionInitialized = true;
            }
            if (playerY > playerLaneY) playerY = playerLaneY;

            // Posicionar enemigo
            enemy.laneY = playerLaneY;
            enemy.x = Math.min(canvas.width - 100, canvas.width * 0.75);
            enemy.y = playerLaneY;
        }

        // --- Carga de imágenes ---
        let imagesLoaded = 0;
        const totalImages = 9;

        // --- BLOQUEO DE ORIENTACIÓN HORIZONTAL ---
        // La rotación visual ya la resuelve el CSS (@media orientation: portrait)
        // de forma automática, sin depender de JS ni del auto-rotate del sistema.
        // Aquí solo mantenemos la resolución interna del canvas sincronizada.
        function lockOrientation() {
            // Extra para cuando se instala como PWA/TWA: intenta bloquear también
            // a nivel de sistema. Si el navegador no lo permite, no importa,
            // el CSS ya se encarga de que siempre se vea horizontal.
            try {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            } catch (e) { /* API no soportada, se ignora */ }
        }

        function forceLandscape() {
            setupCanvas();
        }

        function checkImagesLoaded() {
            imagesLoaded++;
            if (imagesLoaded === totalImages) {
                lockOrientation();
                forceLandscape();
                window.addEventListener('resize', forceLandscape);
                window.addEventListener('orientationchange', () => {
                    lockOrientation();
                    setTimeout(forceLandscape, 100);
                });
                requestAnimationFrame(animate);
            }
        }

        idleSprite.onload = checkImagesLoaded;
        walkSprite.onload = checkImagesLoaded;
        jumpSprite.onload = checkImagesLoaded;
        kickSprite.onload = checkImagesLoaded;
        kick2Sprite.onload = checkImagesLoaded;
        punchSprite.onload = checkImagesLoaded;
        punch2Sprite.onload = checkImagesLoaded;
        punchAirSprite.onload = checkImagesLoaded;
        kickAirSprite.onload = checkImagesLoaded;

        const showError = (name) => {
            document.querySelector('#canvas-wrapper').innerHTML = `<h2 style='color:red; text-align:center; padding:20px;'>❌ ERROR: No se encontró '${name}'.</h2>`;
        };
        idleSprite.onerror = () => showError('idle_subzero.png');
        walkSprite.onerror = () => showError('walk_subzero.png');
        jumpSprite.onerror = () => showError('jump_subzero.png');
        kickSprite.onerror = () => showError('kick_subzero.png');
        kick2Sprite.onerror = () => showError('kick_subzero2.png');
        punchSprite.onerror = () => showError('punch_subzero.png');
        punch2Sprite.onerror = () => showError('punch_subzero2.png');
        punchAirSprite.onerror = () => showError('punch_air.png');
        kickAirSprite.onerror = () => showError('kick_air.png');

        // --- DETECCIÓN DE DAÑO ---
        // Retraso (ms) tras iniciar el ataque aéreo antes de aplicar daño,
        // ya que estos sprites son de un solo frame y no tienen "frame de impacto".
        const airHitDelay = { punch_air: 100, kick_air: 110 };

        function checkHit() {
            if (damageDealt || enemy.dead) return;

            // El hit ocurre en el frame de impacto (frame 2, índice 2) para ataques de suelo.
            // Los ataques aéreos (un solo frame) usan un pequeño retraso de tiempo en su lugar.
            if (attackKind === 'punch_air' || attackKind === 'kick_air') {
                if (attackTimer < (airHitDelay[attackKind] || 100)) return;
            } else if (currentFrame !== 2) {
                return;
            }

            // Calcular distancia en X y en profundidad (laneY)
            const playerWidth = baseDrawWidth * 0.8;
            const enemyWidth = enemy.width;
            const distX = Math.abs((playerX + playerWidth/2) - (enemy.x + enemyWidth/2));
            const distLane = Math.abs(playerLaneY - enemy.laneY);

            // Rango de golpe: 80px en X, 30px en profundidad
            if (distX < 90 && distLane < 40) {
                const dmg = damageValues[attackKind] || 10;
                enemy.health = Math.max(0, enemy.health - dmg);
                enemy.flashTimer = 200;
                damageDealt = true;

                // Texto flotante de daño
                const textX = enemy.x + enemy.width / 2;
                const textY = enemy.y - 20;
                const color = attackKind === 'punch2' ? '#0ff' : '#ff4444';
                spawnFloatingText(textX, textY, `-${dmg}`, color);

                if (enemy.health <= 0) {
                    enemy.dead = true;
                    spawnFloatingText(textX, textY - 30, '¡K.O.!', '#ffd700');
                    setTimeout(resetEnemy, 2000);
                }
            }
        }

        // --- BUCLE PRINCIPAL ---
        function animate(time) {
            if (!lastTime) lastTime = time;
            const deltaTime = time - lastTime; 

            if (!lastJumpFrameTime) lastJumpFrameTime = time;
            const jumpDeltaTime = time - lastJumpFrameTime;
            lastJumpFrameTime = time;

            const isMoving = !isAttacking && (keys.left || keys.right || keys.forward || keys.backward);

            // Iniciar ataque (los ataques aéreos solo se solicitan estando en el aire,
            // ver requestAttack; los ataques de suelo solo se solicitan sin saltar)
            if (attackRequested && !isAttacking) {
                isAttacking = true;
                attackKind = attackRequested;
                attackTimer = 0;
                lastAttackFrameTime = time;
                damageDealt = false;
                if (attackKind === 'punch') currentSprite = punchSprite;
                else if (attackKind === 'punch2') currentSprite = punch2Sprite;
                else if (attackKind === 'kick2') currentSprite = kick2Sprite;
                else if (attackKind === 'punch_air') currentSprite = punchAirSprite;
                else if (attackKind === 'kick_air') currentSprite = kickAirSprite;
                else currentSprite = kickSprite;
                currentFrame = 0;
            }
            attackRequested = null;

            // Movimiento de carril
            if (!isAttacking) {
                if (keys.forward) playerLaneY -= depthSpeed;
                if (keys.backward) playerLaneY += depthSpeed;
                if (playerLaneY < laneTop) playerLaneY = laneTop;
                if (playerLaneY > laneBottom) playerLaneY = laneBottom;
            }

            const floorY = playerLaneY;

            const wasOnGround = !isJumping;
            if(keys.up && wasOnGround && !isAttacking) {
                velocityY = jumpStrength;
                jumpTimer = 0;
                isLanding = false;
                isJumping = true;
                lastJumpFrameTime = time;
                currentSprite = jumpSprite;
                currentFrame = 0;
            }

            if (isAttacking) {
                velocityX = 0;
            } else if (keys.left) { velocityX = -speed; facingRight = false; } 
            else if (keys.right) { velocityX = speed; facingRight = true; } 
            else { velocityX = 0; }

            playerX += velocityX;

            if (isJumping) {
                velocityY += gravity;
                playerY += velocityY;
                if (playerY >= floorY) {
                    playerY = floorY;
                    velocityY = 0;
                    isJumping = false;
                }
            } else {
                playerY = floorY;
            }

            const isInAir = isJumping;

            // --- Lógica de Ataque ---
            if (isAttacking) {
                let times;
                if (attackKind === 'punch') times = punchFrameTimes;
                else if (attackKind === 'punch2') times = punch2FrameTimes;
                else if (attackKind === 'kick2') times = kick2FrameTimes;
                else if (attackKind === 'punch_air') times = punchAirFrameTimes;
                else if (attackKind === 'kick_air') times = kickAirFrameTimes;
                else times = kickFrameTimes;

                attackTimer += (time - lastAttackFrameTime);
                lastAttackFrameTime = time;

                let cum = 0, frame = totalFrames - 1;
                for (let i = 0; i < times.length; i++) {
                    cum += times[i];
                    if (attackTimer < cum) { frame = i; break; }
                }
                currentFrame = frame;

                // Verificar golpe en frame de impacto
                checkHit();

                const totalAttackTime = times.reduce((a, b) => a + b, 0);
                if (attackTimer >= totalAttackTime) {
                    isAttacking = false;
                    attackKind = null;
                    if (isJumping) {
                        // Sigue cayendo: retoma la animación de salto/caída
                        currentSprite = jumpSprite;
                        currentFrame = 2;
                    } else {
                        currentSprite = (keys.left || keys.right || keys.forward || keys.backward) ? walkSprite : idleSprite;
                        currentFrame = 0;
                    }
                    lastTime = time;
                }

            } else if (isInAir) {
                if (currentSprite !== jumpSprite) {
                    currentSprite = jumpSprite;
                    currentFrame = 0;
                    jumpTimer = 0;
                    lastJumpFrameTime = time;
                } else {
                    jumpTimer += jumpDeltaTime;
                }

                if (jumpTimer < jumpFrameTimes[0]) currentFrame = 0;
                else if (jumpTimer < jumpFrameTimes[0] + jumpFrameTimes[1]) currentFrame = 1;
                else currentFrame = 2;

            } else {
                if (currentSprite === jumpSprite && !isLanding) {
                    isLanding = true;
                    currentFrame = 3;
                    landingTimer = 0;
                }

                if (isLanding) {
                    landingTimer += jumpDeltaTime;
                    if (landingTimer >= jumpFrameTimes[3]) {
                        isLanding = false;
                        currentSprite = isMoving ? walkSprite : idleSprite;
                        currentFrame = 0;
                        lastTime = time;
                    }
                } else {
                    if (isMoving) {
                        if (currentSprite !== walkSprite) { currentSprite = walkSprite; currentFrame = 0; }
                        frameSpeed = 220;
                    } else {
                        if (currentSprite !== idleSprite) { currentSprite = idleSprite; currentFrame = 0; }
                        frameSpeed = 150;
                    }

                    if (time - lastTime >= frameSpeed) {
                        currentFrame = (currentFrame + 1) % totalFrames;
                        lastTime = time; 
                    }
                }
            }

            const maxX = canvas.width - (currentSprite.width / totalFrames * scale);
            if (playerX < 0) playerX = 0;
            if (playerX > maxX) playerX = maxX;

            // Actualizar enemigo (sigue al jugador en profundidad lentamente)
            if (!enemy.dead) {
                const targetLaneY = playerLaneY;
                enemy.laneY += (targetLaneY - enemy.laneY) * 0.02;
                enemy.y = enemy.laneY;
            }
            if (enemy.flashTimer > 0) enemy.flashTimer -= deltaTime;

            // Actualizar textos flotantes
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].timer += deltaTime;
                floatingTexts[i].y -= 0.8; // subir
                if (floatingTexts[i].timer >= floatingTexts[i].life) {
                    floatingTexts.splice(i, 1);
                }
            }

            // --- RENDERIZADO ---
            if (currentSprite.complete) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Fondo del carril
                ctx.fillStyle = 'rgba(78, 204, 163, 0.08)';
                ctx.fillRect(0, laneTop, canvas.width, (laneBottom - laneTop) + ((idleSprite.height || 369) * scale) + 24);

                ctx.fillStyle = '#4ecca3';
                ctx.fillRect(0, floorY + ((idleSprite.height || 369) * scale), canvas.width, 4);

                const laneRange = Math.max(1, laneBottom - laneTop);
                const depthRatio = (laneBottom - playerLaneY) / laneRange; 
                const perspectiveScale = 1 - depthRatio * 0.15;

                const drawWidth = Math.round(baseDrawWidth * perspectiveScale);
                const drawHeight = Math.round(baseDrawHeight * perspectiveScale);
                const drawX = Math.round(playerX);
                const drawY = Math.round(playerY + baseDrawHeight - drawHeight);

                let offset = 0;
                let sourceImg = null;
                let sourceX = 0, sourceY = 0, sourceW = 0, sourceH = 0;
                let targetDrawWidth = drawWidth;
                let targetDrawHeight = drawHeight;
                let finalDrawY = drawY;

                // --- Renderizado de sprites ---
                if (isAttacking && attackKind === 'punch') {
                    sourceImg = punchSprite;
                    const sfw = sourceImg.width / totalFrames;
                    const sfh = sourceImg.height;
                    sourceX = Math.floor((currentFrame * sfw) + punchCropAdjustX[currentFrame]); 
                    sourceY = 0; 
                    sourceW = Math.floor(sfw + punchCropAdjustW[currentFrame]);
                    sourceH = Math.floor(sfh);
                    offset = Math.round(punchFrameOffset[currentFrame] * scale);
                    const punchAspectScale = (baseDrawHeight / sourceH) * punchCustomScale;
                    targetDrawWidth = Math.round(sourceW * punchAspectScale * perspectiveScale);
                    targetDrawHeight = Math.round(sourceH * punchAspectScale * perspectiveScale);
                    finalDrawY = Math.round(drawY + punchVerticalOffset);

                } else if (isAttacking && attackKind === 'punch2') {
                    sourceImg = punch2Sprite;
                    const sfw = sourceImg.width / totalFrames;
                    const sfh = sourceImg.height;
                    sourceX = Math.floor((currentFrame * sfw) + punch2CropAdjustX[currentFrame]); 
                    sourceY = 0; 
                    sourceW = Math.floor(sfw + punch2CropAdjustW[currentFrame]);
                    sourceH = Math.floor(sfh);
                    offset = Math.round(punch2FrameOffset[currentFrame] * scale);
                    const punch2AspectScale = (baseDrawHeight / sourceH) * punch2CustomScale;
                    targetDrawWidth = Math.round(sourceW * punch2AspectScale * perspectiveScale);
                    targetDrawHeight = Math.round(sourceH * punch2AspectScale * perspectiveScale);
                    finalDrawY = Math.round(drawY + punch2VerticalOffset);

                } else if (isAttacking && attackKind === 'kick2') {
                    sourceImg = kick2Sprite;
                    const sfw = sourceImg.width / totalFrames;
                    const sfh = sourceImg.height;
                    sourceX = Math.floor(currentFrame * sfw); 
                    sourceY = 0; 
                    sourceW = Math.floor(sfw);
                    sourceH = Math.floor(sfh);
                    offset = Math.round(kickFrameOffset[currentFrame] * scale);
                    const kick2AspectScale = (baseDrawHeight / sourceH) * kickCustomScale;
                    targetDrawWidth = Math.round(sourceW * kick2AspectScale * perspectiveScale);
                    targetDrawHeight = Math.round(sourceH * kick2AspectScale * perspectiveScale);
                    finalDrawY = Math.round(drawY + kickVerticalOffset);

                } else if (isAttacking && attackKind === 'kick') {
                    sourceImg = kickSprite;
                    const sfw = sourceImg.width / totalFrames;
                    const sfh = sourceImg.height;
                    sourceX = Math.floor(currentFrame * sfw); 
                    sourceY = 0; 
                    sourceW = Math.floor(sfw);
                    sourceH = Math.floor(sfh);
                    offset = Math.round(kickFrameOffset[currentFrame] * scale);
                    const kickAspectScale = (baseDrawHeight / sourceH) * kickCustomScale;
                    targetDrawWidth = Math.round(sourceW * kickAspectScale * perspectiveScale);
                    targetDrawHeight = Math.round(sourceH * kickAspectScale * perspectiveScale);
                    finalDrawY = Math.round(drawY + kickVerticalOffset);

                } else if (isAttacking && attackKind === 'punch_air') {
                    sourceImg = punchAirSprite;
                    // Spritesheet de 4 frames; el personaje solo está en el frame fijo punchAirSourceFrame
                    const sfw = sourceImg.width / totalFrames;
                    const sfh = sourceImg.height;
                    sourceX = Math.floor((punchAirSourceFrame * sfw) + punchAirCropAdjustX[0]);
                    sourceY = 0;
                    sourceW = Math.floor(sfw + punchAirCropAdjustW[0]);
                    sourceH = Math.floor(sfh);
                    offset = Math.round(punchAirFrameOffset[0] * scale);
                    const punchAirAspectScale = (baseDrawHeight / sourceH) * punchAirCustomScale;
                    targetDrawWidth = Math.round(sourceW * punchAirAspectScale * perspectiveScale);
                    targetDrawHeight = Math.round(sourceH * punchAirAspectScale * perspectiveScale);
                    finalDrawY = Math.round(drawY + punchAirVerticalOffset);

                } else if (isAttacking && attackKind === 'kick_air') {
                    sourceImg = kickAirSprite;
                    // Spritesheet de 4 frames; el personaje solo está en el frame fijo kickAirSourceFrame
                    const sfw = sourceImg.width / totalFrames;
                    const sfh = sourceImg.height;
                    sourceX = Math.floor((kickAirSourceFrame * sfw) + kickAirCropAdjustX[0]);
                    sourceY = 0;
                    sourceW = Math.floor(sfw + kickAirCropAdjustW[0]);
                    sourceH = Math.floor(sfh);
                    offset = Math.round(kickAirFrameOffset[0] * scale);
                    const kickAirAspectScale = (baseDrawHeight / sourceH) * kickAirCustomScale;
                    targetDrawWidth = Math.round(sourceW * kickAirAspectScale * perspectiveScale);
                    targetDrawHeight = Math.round(sourceH * kickAirAspectScale * perspectiveScale);
                    finalDrawY = Math.round(drawY + kickAirVerticalOffset);

                } else {
                    sourceImg = currentSprite;
                    const sfw = sourceImg.width / totalFrames;
                    const sfh = sourceImg.height;
                    sourceX = Math.floor(currentFrame * sfw); sourceY = 0; sourceW = Math.floor(sfw); sourceH = Math.floor(sfh);

                    let currentOffset = [0,0,0,0];
                    if (currentSprite === idleSprite) currentOffset = idleFrameOffset;
                    else if (currentSprite === walkSprite) currentOffset = walkFrameOffset;
                    else if (currentSprite === jumpSprite) currentOffset = jumpFrameOffset;
                    else if (currentSprite === kickSprite) currentOffset = kickFrameOffset;
                    offset = Math.round(currentOffset[currentFrame] * scale);
                    finalDrawY = drawY;
                }

                // --- DIBUJAR JUGADOR ---
                ctx.save(); 
                if (!facingRight) {
                    ctx.translate(drawX + targetDrawWidth, finalDrawY);
                    ctx.scale(-1, 1);
                    ctx.drawImage(
                        sourceImg,
                        sourceX, sourceY, sourceW, sourceH,
                        -offset, 0, targetDrawWidth, targetDrawHeight
                    );
                } else {
                    ctx.drawImage(
                        sourceImg,
                        sourceX, sourceY, sourceW, sourceH,
                        drawX + offset, finalDrawY, targetDrawWidth, targetDrawHeight
                    );
                }
                ctx.restore();

                // --- DIBUJAR ENEMIGO (DUMMY) ---
                if (!enemy.dead || enemy.flashTimer > 0) {
                    const enemyDepthRatio = (laneBottom - enemy.laneY) / laneRange;
                    const enemyScale = 1 - enemyDepthRatio * 0.15;
                    const eW = enemy.width * enemyScale;
                    const eH = enemy.height * enemyScale;
                    const eX = enemy.x;
                    const eY = enemy.y + baseDrawHeight - eH;

                    ctx.save();
                    if (enemy.flashTimer > 0) {
                        ctx.globalAlpha = 0.6 + Math.sin(time / 30) * 0.4;
                    }

                    // Cuerpo del enemigo
                    ctx.fillStyle = enemy.flashTimer > 0 ? '#fff' : '#c0392b';
                    ctx.fillRect(eX, eY, eW, eH);

                    // Cabeza
                    ctx.fillStyle = enemy.flashTimer > 0 ? '#fff' : '#e74c3c';
                    ctx.fillRect(eX + eW * 0.2, eY, eW * 0.6, eH * 0.25);

                    // Ojos
                    ctx.fillStyle = '#2c3e50';
                    ctx.fillRect(eX + eW * 0.3, eY + eH * 0.08, eW * 0.15, eH * 0.06);
                    ctx.fillRect(eX + eW * 0.55, eY + eH * 0.08, eW * 0.15, eH * 0.06);

                    ctx.restore();

                    // Barra de vida del enemigo
                    const barW = eW * 1.2;
                    const barH = 6;
                    const barX = eX + eW / 2 - barW / 2;
                    const barY = eY - 12;

                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);

                    const healthPct = enemy.health / enemy.maxHealth;
                    let healthColor = '#2ecc71';
                    if (healthPct < 0.5) healthColor = '#f1c40f';
                    if (healthPct < 0.25) healthColor = '#e74c3c';

                    ctx.fillStyle = healthColor;
                    ctx.fillRect(barX, barY, barW * healthPct, barH);
                }

                // --- DIBUJAR TEXTOS FLOTANTES ---
                for (const ft of floatingTexts) {
                    const alpha = 1 - (ft.timer / ft.life);
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.font = 'bold 22px sans-serif';
                    ctx.fillStyle = ft.color;
                    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                    ctx.lineWidth = 3;
                    ctx.textAlign = 'center';
                    ctx.strokeText(ft.text, ft.x, ft.y);
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.restore();
                }

                // --- HUD: Vida del enemigo arriba ---
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(10, 10, 120, 8);
                const hudHealthPct = enemy.health / enemy.maxHealth;
                let hudColor = '#2ecc71';
                if (hudHealthPct < 0.5) hudColor = '#f1c40f';
                if (hudHealthPct < 0.25) hudColor = '#e74c3c';
                ctx.fillStyle = hudColor;
                ctx.fillRect(10, 10, 120 * hudHealthPct, 8);

                // Instrucciones
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '11px sans-serif';

            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
