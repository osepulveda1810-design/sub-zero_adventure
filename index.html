<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sub-Zero Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; }

        body {
            background-color: #16213e; display: flex; justify-content: center; align-items: center;
            height: 100dvh; width: 100vw; overflow: hidden; font-family: sans-serif; touch-action: none; position: fixed;
        }

        /* --- OVERLAY DE ORIENTACIÓN --- */
        #rotate-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0f172a; color: #fff; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        #rotate-overlay h2 { font-size: 28px; margin-bottom: 20px; color: #4ecca3; }
        #rotate-overlay p { font-size: 18px; color: #94a3b8; }
        .rotate-icon { font-size: 60px; margin-bottom: 20px; animation: spin 2s infinite linear; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(90deg); } }

        @media (orientation: portrait) {
            #rotate-overlay { display: flex; }
            #game-container { display: none; }
        }
        @media (orientation: landscape) {
            #rotate-overlay { display: none !important; }
            #game-container { display: flex !important; }
        }

        /* --- CONTENEDOR DEL JUEGO (ESCENARIO COMPLETO) --- */
        #game-container {
            display: flex;
            width: 100vw; height: 100dvh;
            max-width: none; padding: 0; background-color: #16213e;
        }

        #canvas-wrapper {
            position: relative; 
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
            background-color: #16213e; 
            overflow: hidden;
        }

        canvas { 
            display: block; 
            width: 100%; height: 100%;
            image-rendering: pixelated; 
            background-color: #16213e; 
        }

        /* --- BOTÓN DE PANTALLA COMPLETA --- */
        #btn-fullscreen {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 20px; width: 40px; height: 40px;
            border-radius: 8px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 10; touch-action: manipulation;
        }
        #btn-fullscreen:active { background: rgba(78, 204, 163, 0.4); border-color: #4ecca3; }

        /* --- CONTROLES TÁCTILES (FLOTANDO SOBRE EL CANVAS) --- */
        #controls {
            position: absolute;
            bottom: max(15px, env(safe-area-inset-bottom, 15px));
            left: 0; width: 100%; padding: 0 15px;
            display: flex; justify-content: space-between;
            align-items: flex-end; z-index: 10;
            pointer-events: none; 
        }

        #controls .control-group, #controls .btn {
            pointer-events: auto; 
        }

        .btn {
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.3);
            background: rgba(20, 30, 50, 0.6); 
            backdrop-filter: blur(2px);
            color: #fff; font-size: 24px;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            transition: all 0.1s; touch-action: none; cursor: pointer;
        }
        .btn:active, .btn.active { background: rgba(78, 204, 163, 0.6); border-color: rgba(78, 204, 163, 1); transform: scale(0.9); }

        #btn-jump { width: 90px; height: 90px; background: rgba(200, 30, 30, 0.4); border-color: rgba(255, 50, 50, 0.6); font-weight: bold; font-size: 18px; }
        #btn-jump:active, #btn-jump.active { background: rgba(255, 50, 50, 0.8); }

        @media (max-width: 500px) {
            .btn { width: 60px; height: 60px; font-size: 22px; }
            #btn-jump { width: 75px; height: 75px; }
        }
        @media (max-width: 400px) {
            .btn { width: 55px; height: 55px; font-size: 20px; }
            #btn-jump { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>

    <div id="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <h2>Gira tu dispositivo</h2>
        <p>Pon tu teléfono en modo horizontal.</p>
    </div>

    <div id="game-container">
        <div id="canvas-wrapper">
            <button id="btn-fullscreen">⛶</button>
            <canvas id="gameCanvas"></canvas>

            <div id="controls">
                <div class="control-group">
                    <button class="btn" id="btn-left">◀</button>
                    <button class="btn" id="btn-right">▶</button>
                </div>
                <div class="control-group">
                    <button class="btn" id="btn-jump">SALTO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const idleSprite = new Image(); idleSprite.src = 'idle_subzero.png';
        const walkSprite = new Image(); walkSprite.src = 'walk_subzero.png';
        const jumpSprite = new Image(); jumpSprite.src = 'jump_subzero.png';

        let currentSprite = idleSprite; 
        let currentFrame = 0;
        const totalFrames = 4;
        let frameSpeed = 150;
        let lastTime = 0;
        let lastJumpFrameTime = 0;

        let playerX = 50; let playerY = 50;
        let velocityX = 0; let velocityY = 0;
        const speed = 2.2; const gravity = 0.22; const jumpStrength = -7.5;
        let facingRight = true; let scale = 1;

        const idleFrameOffset = [-5, -2, 2, 6];
        const walkFrameOffset = [0, 0, 0, 0];
        const jumpFrameOffset = [0, 0, 0, 0];

        let jumpTimer = 0;
        let isLanding = false;
        let landingTimer = 0;
        // --- TIEMPOS DE SALTO: frame3 se mantiene mientras esté en el aire; el 4to valor es cuánto dura el frame de aterrizaje ---
        const jumpFrameTimes = [150, 120, 260, 180]; 

        const keys = { right: false, left: false, up: false };

        // --- FUNCIÓN FULLSCREEN ---
        const fullscreenBtn = document.getElementById('btn-fullscreen');

        async function enterFullscreen() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
                if (document.fullscreenElement === null && document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
            } catch (err) { }
        }

        fullscreenBtn.addEventListener('click', enterFullscreen);
        fullscreenBtn.addEventListener('touchstart', (e) => { e.preventDefault(); enterFullscreen(); });

        // --- CONTROLES ---
        document.addEventListener('keydown', (e) => {
            if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { keys.up = true; e.preventDefault(); }
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
        });

        function setupTouchButton(elementId, keyName) {
            const el = document.getElementById(elementId);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; el.classList.add('active'); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; el.classList.remove('active'); });
            el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[keyName] = false; el.classList.remove('active'); });
        }
        setupTouchButton('btn-left', 'left');
        setupTouchButton('btn-right', 'right');
        setupTouchButton('btn-jump', 'up');

        // --- CONFIGURACIÓN DEL CANVAS ---
        function setupCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const w = wrapper.clientWidth;
            const h = wrapper.clientHeight;

            canvas.width = w;
            const frameHeight = idleSprite.height;
            scale = (h * 0.45) / frameHeight; 
            canvas.height = (frameHeight * scale) + 50;

            const floorY = canvas.height - (frameHeight * scale) - 10;
            if (playerY > floorY) playerY = floorY;
        }

        let imagesLoaded = 0;
        function checkImagesLoaded() {
            imagesLoaded++;
            if (imagesLoaded === 3) {
                setupCanvas();
                window.addEventListener('resize', setupCanvas);
                requestAnimationFrame(animate);
            }
        }

        idleSprite.onload = checkImagesLoaded;
        walkSprite.onload = checkImagesLoaded;
        jumpSprite.onload = checkImagesLoaded;

        const showError = (name) => {
            document.querySelector('#canvas-wrapper').innerHTML = `<h2 style='color:red; text-align:center; padding:20px;'>❌ ERROR: No se encontró '${name}'.</h2>`;
        };
        idleSprite.onerror = () => showError('idle_subzero.png');
        walkSprite.onerror = () => showError('walk_subzero.png');
        jumpSprite.onerror = () => showError('jump_subzero.png');

        // --- BUCLE PRINCIPAL ---
        function animate(time) {
            if (!lastTime) lastTime = time;
            const deltaTime = time - lastTime; 

            if (!lastJumpFrameTime) lastJumpFrameTime = time;
            const jumpDeltaTime = time - lastJumpFrameTime;
            lastJumpFrameTime = time;

            const isMoving = keys.left || keys.right;
            const frameHeight = currentSprite.height;
            const floorY = canvas.height - (frameHeight * scale) - 10;

            const wasOnGround = playerY >= floorY;
            if(keys.up && wasOnGround) {
                velocityY = jumpStrength;
                jumpTimer = 0;
                isLanding = false;
                lastJumpFrameTime = time;
                currentSprite = jumpSprite;
                currentFrame = 0;
            }

            if (keys.left) { velocityX = -speed; facingRight = false; } 
            else if (keys.right) { velocityX = speed; facingRight = true; } 
            else { velocityX = 0; }

            velocityY += gravity;
            playerX += velocityX;
            playerY += velocityY;

            const isInAir = playerY < floorY - 1;

            if (isInAir) {
                if (currentSprite !== jumpSprite) {
                    currentSprite = jumpSprite;
                    currentFrame = 0;
                    jumpTimer = 0;
                    lastJumpFrameTime = time;
                } else {
                    jumpTimer += jumpDeltaTime;
                }

                // Usamos los nuevos tiempos sugeridos
                if (jumpTimer < jumpFrameTimes[0]) currentFrame = 0;
                else if (jumpTimer < jumpFrameTimes[0] + jumpFrameTimes[1]) currentFrame = 1;
                else currentFrame = 2;

            } else {
                if (playerY > floorY) { playerY = floorY; velocityY = 0; }

                if (currentSprite === jumpSprite && !isLanding) {
                    // Momento exacto de tocar el suelo: mostrar el frame 4 (aterrizaje)
                    isLanding = true;
                    currentFrame = 3;
                    landingTimer = 0;
                }

                if (isLanding) {
                    landingTimer += jumpDeltaTime;
                    if (landingTimer >= jumpFrameTimes[3]) {
                        isLanding = false;
                        currentSprite = isMoving ? walkSprite : idleSprite;
                        currentFrame = 0;
                        lastTime = time;
                    }
                } else {
                    if (isMoving) {
                        if (currentSprite !== walkSprite) { currentSprite = walkSprite; currentFrame = 0; }
                        frameSpeed = 220;
                    } else {
                        if (currentSprite !== idleSprite) { currentSprite = idleSprite; currentFrame = 0; }
                        frameSpeed = 150;
                    }

                    if (time - lastTime >= frameSpeed) {
                        currentFrame = (currentFrame + 1) % totalFrames;
                        lastTime = time; 
                    }
                }
            }

            const maxX = canvas.width - (currentSprite.width / totalFrames * scale);
            if (playerX < 0) playerX = 0;
            if (playerX > maxX) playerX = maxX;

            if (currentSprite.complete) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4ecca3';
                ctx.fillRect(0, floorY + (frameHeight * scale), canvas.width, 4);

                const frameWidth = currentSprite.width / totalFrames;
                const drawWidth = Math.round(frameWidth * scale);
                const drawHeight = Math.round(frameHeight * scale);
                const drawX = Math.round(playerX);
                const drawY = Math.round(playerY);

                let currentOffset = [0,0,0,0];
                if (currentSprite === idleSprite) currentOffset = idleFrameOffset;
                else if (currentSprite === walkSprite) currentOffset = walkFrameOffset;
                else if (currentSprite === jumpSprite) currentOffset = jumpFrameOffset;

                const offset = Math.round(currentOffset[currentFrame] * scale);

                ctx.save(); 
                if (!facingRight) {
                    ctx.translate(drawX + drawWidth, drawY);
                    ctx.scale(-1, 1);
                    ctx.drawImage(
                        currentSprite,
                        currentFrame * frameWidth, 0, frameWidth, frameHeight,
                        -offset, 0, drawWidth, drawHeight
                    );
                } else {
                    ctx.drawImage(
                        currentSprite,
                        currentFrame * frameWidth, 0, frameWidth, frameHeight,
                        drawX + offset, drawY, drawWidth, drawHeight
                    );
                }
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
